<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Definice stínu -->
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Definice barevného přechodu pro A (Červená) -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4C4C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D60000;stop-opacity:1" />
    </linearGradient>

    <!-- Definice barevného přechodu pro P (Modrá) -->
    <linearGradient id="gradP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#457B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D3557;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Písmeno A s přechodem a stínem -->
  <text x="5" y="52" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="58" 
        font-weight="900" 
        fill="url(#gradA)" 
        filter="url(#shadow)">A</text>
  
  <!-- Písmeno P s přechodem, bílým obrysem a stínem (Překryv) -->
  <text x="32" y="60" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="38" 
        font-weight="900" 
        fill="url(#gradP)" 
        stroke="white" 
        stroke-width="3" 
        filter="url(#shadow)">P</text>
  
  <!-- Druhá vrstva P bez obrysu pro ostrý vnitřek -->
  <text x="32" y="60" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="38" 
        font-weight="900" 
        fill="url(#gradP)">P</text>
</svg>
